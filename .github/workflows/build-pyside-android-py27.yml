name: build-pyside-android-py27-docker

# PySide 1 (Qt 4.8) -> Android APK — Docker / Ubuntu 14.04 edition.
#
# Why Docker / Ubuntu 14.04?
# --------------------------
# After 8 rounds of fighting incompatibilities between M4rtinK's 2013-era
# build code and modern Ubuntu 22.04 (missing shiboken package, modern
# GCC strictness, dead URLs, ABI mismatches), we accept the obvious:
# this code was designed to build on Ubuntu 14.04 with GCC 4.8, and
# we should just BUILD IT ON Ubuntu 14.04.
#
# Total runtime (cold):  ~60-90 min
# Total runtime (warm):  ~10 min

on:
  workflow_dispatch:
    inputs:
      project_url:
        description: "Public URL to PySide/Qt4 project zip."
        required: true
        default: "https://raw.githubusercontent.com/Usama01TN/PyQtBuilder/main/testapp_qt4.zip"
      necessitas_sdk_url:
        description: "OPTIONAL Necessitas installer URL.  Empty = use default mirrors."
        required: false
        default: ""
      app_name:
        description: "APK display name."
        required: false
        default: "TestApp"
      unique_name:
        description: "Android package (com.example.X)."
        required: false
        default: "com.example.TestApp"
      pyside_stage_url:
        description: "OPTIONAL pre-built stage tarball URL.  Skips cross-compile."
        required: false
        default: ""
      build_threads:
        description: "Parallel make jobs."
        required: false
        default: "2"

env:
  # QIF 1.0-compatible auto-answer script (October 2011 Installerbase).
  # Stored at workflow level to avoid the heredoc-vs-YAML conflict that
  # bites when you try to use `cat > ... << EOF` inside a `run: |` block.
  # We materialise this to disk with a single-line `printf` later.
  QIF_AUTO_SCRIPT: |
    function Controller() {
    }
    Controller.prototype.WelcomePageCallback = function() {
        gui.clickButton(buttons.NextButton, 3000);
    };
    Controller.prototype.CredentialsPageCallback = function() {
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.IntroductionPageCallback = function() {
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.RepositoryCategoryPageCallback = function() {
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.FetchSetupConfigurationPageCallback = function() {
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.ServerSelectionPageCallback = function() {
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.TargetDirectoryPageCallback = function() {
        var w = gui.currentPageWidget();
        var t = installer.environmentVariable("NECESSITAS_TARGET");
        try {
            if (w.targetDirectoryLineEdit !== undefined) {
                w.targetDirectoryLineEdit.setText(t);
            } else if (w.TargetDirectoryLineEdit !== undefined) {
                w.TargetDirectoryLineEdit.setText(t);
            }
        } catch (e) {}
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.ComponentSelectionPageCallback = function() {
        var w = gui.currentPageWidget();
        try { if (w.selectAll !== undefined) w.selectAll(); } catch (e) {}
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.LicenseAgreementPageCallback = function() {
        var w = gui.currentPageWidget();
        try {
            if (w.acceptLicense !== undefined) w.acceptLicense.setChecked(true);
            else if (w.AcceptLicenseRadioButton !== undefined)
                w.AcceptLicenseRadioButton.setChecked(true);
        } catch (e) {}
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.StartMenuDirectoryPageCallback = function() {
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.ReadyForInstallationPageCallback = function() {
        gui.clickButton(buttons.NextButton);
    };
    Controller.prototype.PerformInstallationPageCallback = function() {};
    Controller.prototype.FinishedPageCallback = function() {
        gui.clickButton(buttons.FinishButton);
    };

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      PROJECT_URL:        ${{ github.event.inputs.project_url }}
      NECESSITAS_SDK_URL: ${{ github.event.inputs.necessitas_sdk_url }}
      APP_NAME:           ${{ github.event.inputs.app_name }}
      UNIQUE_NAME:        ${{ github.event.inputs.unique_name }}
      PYSIDE_STAGE_URL:   ${{ github.event.inputs.pyside_stage_url }}
      BUILD_THREADS:      ${{ github.event.inputs.build_threads }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify needed files are in the repo
        run: |
          for f in build_pyside_android.py Dockerfile.pyside-builder; do
            if [ ! -f "$f" ]; then
              echo "::error::$f missing from repo root."
              exit 1
            fi
          done

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      /usr/local/lib/android/sdk/ndk \
                      /opt/hostedtoolcache/CodeQL \
                      "$AGENT_TOOLSDIRECTORY"
          sudo apt-get -y purge --auto-remove \
              azure-cli google-cloud-cli microsoft-edge-stable \
              google-chrome-stable firefox powershell || true
          docker system prune -af || true
          df -h /

      # ════════ Build the Docker image (or reuse cached layers) ════════
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pyside-builder Docker image (with layer caching)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.pyside-builder
          tags: pyside-builder:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show what the Docker image contains
        run: docker run --rm pyside-builder

      # ════════ Acquire Necessitas SDK ════════
      - name: Cache Necessitas SDK
        id: necessitas-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/necessitas
          key: necessitas-sdk-${{ hashFiles('Dockerfile.pyside-builder') }}-v1

      - name: Write QIF auto-answer script to disk
        if: steps.necessitas-cache.outputs.cache-hit != 'true'
        run: |
          # Materialise QIF_AUTO_SCRIPT env var to a real file on the host.
          # We'll mount this file into the container at /tmp/qif-auto.qs.
          mkdir -p /home/runner/qif
          printf '%s\n' "$QIF_AUTO_SCRIPT" > /home/runner/qif/qif-auto.qs
          echo "Wrote $(wc -l < /home/runner/qif/qif-auto.qs) lines"

      - name: Download + install Necessitas SDK (inside Docker container)
        if: steps.necessitas-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /home/runner/necessitas
          # Run the installer INSIDE the Ubuntu 14.04 container.  The QS
          # script and installer log are exchanged via /tmp bind mounts
          # so we don't need any heredocs inside this YAML.
          docker run --rm \
            -v /home/runner/necessitas:/necessitas \
            -v /home/runner/qif:/qif:ro \
            -v "${GITHUB_WORKSPACE}:/work" \
            -e NECESSITAS_TARGET=/necessitas \
            -e USER_URL="$NECESSITAS_SDK_URL" \
            pyside-builder \
            bash -ec '
              cd /tmp

              URLS=(
                "${USER_URL}"
                "https://zenodo.org/records/20335718/files/necessitas-0.3-online-sdk-installer-linux?download=1"
                "https://archive.org/download/necessitassdk/necessitas-0.3-online-sdk-installer-linux"
                "https://zenodo.org/records/20335718/files/linux-online-necessitas-alpha4.1-sdk-installer?download=1"
              )

              for URL in "${URLS[@]}"; do
                [ -z "$URL" ] && continue
                echo "Trying: $URL"
                if curl -L --fail --retry 3 --retry-delay 5 --max-time 600 \
                       -A "Mozilla/5.0" -o necessitas.run "$URL"; then
                  SIZE=$(stat -c %s necessitas.run 2>/dev/null || echo 0)
                  if [ "$SIZE" -gt 1048576 ]; then
                    echo "✓ downloaded $SIZE bytes"
                    break
                  fi
                fi
                rm -f necessitas.run
              done

              if [ ! -f necessitas.run ]; then
                echo "::error::All Necessitas URLs failed"
                exit 1
              fi

              chmod +x necessitas.run
              cp /qif/qif-auto.qs /tmp/qif-auto.qs

              # 60-min ceiling for online installer (downloads ~2 GB)
              timeout 60m xvfb-run -a --server-args="-screen 0 1280x1024x24" \
                  ./necessitas.run --script /tmp/qif-auto.qs --verbose \
                  2>&1 | tee /tmp/installer.log || true

              # Soft-validate: at minimum we need Qt installed.  NDK may
              # not be present (Necessitas component server is often dead)
              # — that path is handled by build_pyside_android.py which
              # auto-downloads NDK r10e as fallback.
              if [ ! -d /necessitas/Android/Qt ] && [ ! -d /necessitas/NecessitasQt ]; then
                  echo "::error::No Qt directory after install — fatal."
                  tail -50 /tmp/installer.log
                  exit 1
              fi
              echo "✓ Necessitas SDK installed (Qt present at least)"
              cp /tmp/installer.log /work/necessitas-install.log 2>/dev/null || true
            '

      # ════════ Acquire user project (on host) ════════
      - name: Download project
        run: |
          mkdir -p workspace
          curl -L --fail "$PROJECT_URL" -o project.zip
          unzip -q project.zip -d workspace
          MAIN_PY="$(find workspace -name main.py -maxdepth 4 -type f | head -1)"
          if [ -z "$MAIN_PY" ]; then
            echo "::error::No main.py in project"
            exit 1
          fi
          echo "PROJ_DIR=$(dirname "$MAIN_PY")" >> "$GITHUB_ENV"

      # ════════ Cache builder workspace ════════
      - name: Cache builder workspace
        uses: actions/cache@v4
        with:
          path: /home/runner/pyside-cache
          key: pyside-cache-${{ hashFiles('build_pyside_android.py') }}-v1
          restore-keys: |
            pyside-cache-

      - name: Optional — download pre-built PySide stage
        if: env.PYSIDE_STAGE_URL != ''
        run: |
          mkdir -p /home/runner/pyside-stage
          curl -L --fail --retry 5 -o /tmp/stage.tar.gz "$PYSIDE_STAGE_URL"
          tar -xzf /tmp/stage.tar.gz -C /home/runner/pyside-stage --strip-components=1 \
            || tar -xzf /tmp/stage.tar.gz -C /home/runner/pyside-stage
          echo "PYSIDE_STAGE_DIR=/home/runner/pyside-stage" >> "$GITHUB_ENV"

      # ════════ The actual build — INSIDE the Ubuntu 14.04 container ════════
      - name: Run build_pyside_android.py inside Ubuntu 14.04 container
        run: |
          set -o pipefail
          STAGE_ARGS=""
          if [ -n "$PYSIDE_STAGE_DIR" ]; then
              STAGE_ARGS="--pyside-stage /pyside-stage --skip-build"
          fi

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -v "/home/runner/necessitas:/necessitas" \
            -v "/home/runner/pyside-cache:/cache" \
            ${PYSIDE_STAGE_DIR:+-v "/home/runner/pyside-stage:/pyside-stage"} \
            -w /work \
            -e BUILD_THREADS="$BUILD_THREADS" \
            pyside-builder \
            python2.7 build_pyside_android.py \
                --project-dir    "/work/${PROJ_DIR#workspace/}" \
                --necessitas-sdk /necessitas \
                --cache-dir      /cache \
                --app-name       "$APP_NAME" \
                --unique-name    "$UNIQUE_NAME" \
                --build-threads  "$BUILD_THREADS" \
                $STAGE_ARGS \
                --verbose \
                2>&1 | tee build.log

      - name: Locate APK
        id: locate
        if: success()
        run: |
          APK="$(find /home/runner/pyside-cache/artifacts -name '*.apk' -type f 2>/dev/null | head -1)"
          if [ -z "$APK" ]; then
              APK="$(find /home/runner/pyside-cache/example-project -name '*.apk' -type f 2>/dev/null | head -1)"
          fi
          if [ -z "$APK" ]; then
              echo "::error::No APK produced"
              exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-pyside-qt4-docker
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 7

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-pyside-docker
          path: |
            build.log
            necessitas-install.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Tar PySide stage for future runs (cold-cache only)
        if: success() && env.PYSIDE_STAGE_URL == ''
        run: |
          STAGE_DIR="/home/runner/pyside-cache/build-scripts/stage"
          if [ -d "$STAGE_DIR" ] && [ -n "$(ls -A "$STAGE_DIR" 2>/dev/null)" ]; then
              tar -czf pyside-stage.tar.gz -C "$STAGE_DIR" .
              ls -lh pyside-stage.tar.gz
          fi

      - name: Upload stage tarball
        if: success() && env.PYSIDE_STAGE_URL == ''
        uses: actions/upload-artifact@v4
        with:
          name: pyside-stage-prebuilt
          path: pyside-stage.tar.gz
          if-no-files-found: ignore
          retention-days: 90
