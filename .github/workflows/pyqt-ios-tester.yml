name: PyQt iOS Workflow Tester

on:
  push:
    paths: ['build_pyqt_ios.py', '.github/workflows/pyqt-ios-tester.yml']
  pull_request:
    paths: ['build_pyqt_ios.py']
  workflow_dispatch:
    inputs:
      full_build:
        description: 'Run full iOS build (downloads Qt, compiles sysroot; long)'
        type: boolean
        default: true
      xcode:
        description: 'Optional Xcode version (e.g. "16.4")'
        type: string
        default: ''
      qt_version:
        description: 'Qt version for iOS'
        type: string
        default: '5.15.2'   # OSS iOS kit

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # no cache
      - name: Install linter
        run: pip install ruff
      - name: Lint and byte-compile
        run: |
          ruff check build_pyqt_ios.py
          python -m py_compile build_pyqt_ios.py
      - name: CLI help smoke test
        run: python build_pyqt_ios.py --help

  mac-smoke:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (iOS) – OSS
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ github.event.inputs.qt_version || '5.15.2' }}
          target: ios
          cache: true

      - name: Detect installed Qt version
        run: |
          echo "QT_VER=$(qmake -query QT_VERSION)" >> "$GITHUB_ENV"
          qmake -v

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # no cache

      - name: Validate environment (qmake + script utilities)
        shell: bash
        run: |
          python - <<'PY'
          import importlib.util, pathlib, os
          p = pathlib.Path('build_pyqt_ios.py').resolve()
          spec = importlib.util.spec_from_file_location('build_pyqt_ios', p)
          m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m)
          print('verifyHost()…'); m.verifyHost()
          print('findQmakeIos()…', m.findQmakeIos(None, os.environ['QT_VER']))
          print('OK')
          PY

  ios-full-build:
    name: Full iOS build (always)
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: (Optional) Select Xcode
        if: ${{ (github.event.inputs.xcode || '') != '' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ github.event.inputs.xcode }}

      - name: Install Qt (iOS) – OSS
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ github.event.inputs.qt_version || '5.15.2' }}
          target: ios
          cache: true

      - name: Detect installed Qt version
        run: |
          echo "QT_VER=$(qmake -query QT_VERSION)" >> "$GITHUB_ENV"
          qmake -v

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create tiny app entry (for build)
        run: |
          mkdir -p tests
          cat > tests/smoke_app.py <<'PY'
          import sys
          from PyQt5.QtWidgets import QApplication, QLabel
          app = QApplication(sys.argv)
          QLabel("Hello from CI").show()
          PY

      - name: Run iOS build script (downloads & compiles) in isolated venv
        shell: bash
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: '1'
          # Belt-and-suspenders: force CPython probes for cross-compile
          ac_cv_func_getentropy: 'no'
          ac_cv_func_getrandom: 'no'
          ac_cv_func_openpty: 'no'
          ac_cv_func_futimens: 'no'
          ac_cv_func_utimensat: 'no'
          CFLAGS: '-Wno-implicit-function-declaration'
          CFLAGS_NODIST: '-Wno-implicit-function-declaration'
        run: |
          set -euo pipefail
          "${{ env.pythonLocation }}/bin/python" -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          LOGDIR="$RUNNER_TEMP/pyqt_ios_build"
          mkdir -p "$LOGDIR"
          echo "Interpreter: $(which python)"
          # Tee everything to a log so any non-zero exit has full context
          python build_pyqt_ios.py \
            --qt-ios-qmake "$(which qmake)" \
            --qt-version "${{ env.QT_VER }}" \
            --pyqt-version "5.15.11" \
            --python-version "3.11.9" \
            --workdir "$LOGDIR" \
            --app-entry "tests/smoke_app.py" \
            2>&1 | tee "$LOGDIR/full-build.log"
          # Keep path available for next step
          echo "LOGDIR=$LOGDIR" >> "$GITHUB_ENV"

      - name: Locate Xcode project (if produced)
        id: findproj
        run: |
          PROJ="${{ env.LOGDIR }}/demo/build-ios-64/pyqt-demo.xcodeproj"
          if [ -d "$PROJ" ]; then echo "proj=$PROJ" >> "$GITHUB_OUTPUT"; fi

      - name: Upload Xcode project artifact
        if: ${{ steps.findproj.outputs.proj != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: pyqt-ios-xcodeproj
          path: ${{ steps.findproj.outputs.proj }}

      - name: Upload full build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyqtdeploy-full-build-log
          path: ${{ env.LOGDIR }}/full-build.log
          if-no-files-found: warn
