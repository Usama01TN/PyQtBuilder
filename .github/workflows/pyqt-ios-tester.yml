name: PyQt iOS Workflow Tester

on:
  push:
    paths:
      - 'build_pyqt_ios.py'
      - '.github/workflows/pyqt-ios-tester.yml'
  pull_request:
    paths:
      - 'build_pyqt_ios.py'
  workflow_dispatch:
    inputs:
      full_build:
        description: 'Run full iOS build (downloads Qt, compiles sysroot; long)'
        required: false
        type: boolean
        default: false
      xcode:
        description: 'Optional Xcode version (e.g. "16.4"). Leave empty for runner default.'
        required: false
        type: string
        default: ''
      qt_version:
        description: 'Qt version for iOS'
        required: false
        type: string
        default: '5.15.18'

permissions:
  contents: read

jobs:
  lint:
    name: Lint & CLI help (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install linter
        run: pip install ruff
      - name: Lint and byte-compile
        run: |
          ruff check build_pyqt_ios.py
          python -m py_compile build_pyqt_ios.py
      - name: CLI help smoke test
        run: python build_pyqt_ios.py --help

  mac-smoke:
    name: macOS smoke (qmake & script utilities)
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      QT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.qt_version || '5.15.18' }}
      XCODE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.xcode || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: (Optional) Select Xcode
        if: ${{ env.XCODE_VERSION != '' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Qt (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: ios
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Validate environment (qmake + script utilities)
        shell: bash
        run: |
          which qmake
          qmake -v
          python - <<'PY'
          import importlib.util, pathlib
          p = pathlib.Path('build_pyqt_ios.py').resolve()
          spec = importlib.util.spec_from_file_location('build_pyqt_ios', p)
          m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m)
          # Exercise light-weight functions without starting a full build:
          print('verifyHost()…'); m.verifyHost()
          print('findQmakeIos()…', m.findQmakeIos(None, '${{ env.QT_VERSION }}'))
          print('OK')
          PY

  ios-full-build:
    name: Full iOS build (manual)
    # Only when launched from "Run workflow" AND toggle is enabled
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_build == true }}
    runs-on: macos-latest
    timeout-minutes: 180
    env:
      QT_VERSION: ${{ inputs.qt_version }}
      XCODE_VERSION: ${{ inputs.xcode }}
    steps:
      - uses: actions/checkout@v4

      - name: (Optional) Select Xcode
        if: ${{ env.XCODE_VERSION != '' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Qt (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: ios
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Create tiny app entry (for build)
        run: |
          mkdir -p tests
          cat > tests/smoke_app.py <<'PY'
          import sys
          from PyQt5.QtWidgets import QApplication, QLabel
          app = QApplication(sys.argv)
          label = QLabel("Hello from CI")
          label.resize(320, 200)
          label.show()
          # No event loop needed for pyqtdeploy's entry discovery.
          PY

      - name: Run iOS build script (downloads & compiles)
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: '1'
        run: |
          python build_pyqt_ios.py \
            --qt-ios-qmake "$(which qmake)" \
            --qt-version "${{ env.QT_VERSION }}" \
            --pyqt-version "5.15.11" \
            --workdir "$RUNNER_TEMP/pyqt_ios_build" \
            --app-entry "tests/smoke_app.py"

      - name: Locate Xcode project (if produced)
        id: findproj
        run: |
          PROJ="$RUNNER_TEMP/pyqt_ios_build/demo/build-ios-64/pyqt-demo.xcodeproj"
          if [ -d "$PROJ" ]; then
            echo "proj=$PROJ" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Xcode project artifact
        if: ${{ steps.findproj.outputs.proj != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: pyqt-ios-xcodeproj
          path: ${{ steps.findproj.outputs.proj }}
