name: build-pyside6-android

# Day 1: trigger manually from the Actions tab.
# Day 5+: the same workflow gets triggered via repository_dispatch from Django,
#         and the trailing steps will POST results back to your webhook.
on:
  workflow_dispatch:
    inputs:
      project_url:
        description: "Public URL to the project zip (e.g. raw.githubusercontent.com/.../testapp.zip)"
        required: true
        default: "https://raw.githubusercontent.com/Usama01TN/PyQtBuilder/main/testapp.zip"
      arch:
        description: "Android ABI"
        required: true
        default: "arm64-v8a"
        type: choice
        options: [arm64-v8a, armeabi-v7a, x86_64, x86]
      build_id:
        description: "Optional build ID for tracking (leave blank when running by hand)"
        required: false
        default: ""

  # Wired up in Phase 2 — Django dispatches with these same inputs.
  repository_dispatch:
    types: [pyside6-android-build]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 96

    # Normalize inputs so manual runs and Django dispatches use the same names.
    env:
      PROJECT_URL: ${{ github.event.inputs.project_url || github.event.client_payload.project_url }}
      ARCH:        ${{ github.event.inputs.arch        || github.event.client_payload.arch        }}
      BUILD_ID:    ${{ github.event.inputs.build_id    || github.event.client_payload.build_id    }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Free disk space (runners ship with ~14 GB; we need ~25)
        # NDK alone is ~6 GB, the SDK adds ~3 GB, and Python source +
        # cross-compiled artifacts add another ~5 GB. Without this step
        # the build runs out of disk during the openssl recipe.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android/sdk/ndk     # buildozer downloads its own
          docker system prune -af || true
          df -h

      - name: Set up Python 3.11
        # The script enforces this hard at preflight — PySide6 6.10.x wheels are
        # cp311-only on Linux, so the host Python must match.
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install host build deps
        # Two groups:
        #   1. Qt runtime libs needed to even import PySide6 on the host.
        #   2. Buildozer / python-for-android build chain — autoconf, libffi-dev, etc.
        #      P4A compiles libffi, openssl, and friends from source during the build,
        #      so the *-dev headers must be present on the host system.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libgl1 libegl1 libxkbcommon0 libdbus-1-3 libfontconfig1 \
              build-essential git curl unzip zip cmake \
              autoconf automake libtool pkg-config m4 \
              libffi-dev libssl-dev zlib1g-dev \
              libncurses-dev libsqlite3-dev libbz2-dev liblzma-dev \
              libreadline-dev ccache

      # The killer optimisation: the first build downloads ~10 GB of NDK/SDK/wheels
      # into ~/.pyside6_android_deploy. The cache makes every subsequent build ~5 min.
      - name: Cache Qt + Android toolchain
        id: tc-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pyside6_android_deploy
            ~/.cache/pip
          key:          pyside6-toolchain-v2-${{ env.ARCH }}-${{ hashFiles('pyside6_android_builder.py') }}
          restore-keys: pyside6-toolchain-v2-${{ env.ARCH }}-

      # Cache the build-tool venv (PySide6 + pyside6-android-deploy + p4a deps, ~250 MB).
      # Lives outside the project dir — required to avoid Qt bundling the venv into the APK.
      # The hashFiles entry ties cache validity to the script: any change in the
      # script (especially the patcher logic) invalidates the cached venv, so a
      # fresh `setup_venv` runs and the patches re-apply to a fresh PySide6 install.
      - name: Cache build-tool venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pyside6-android-builder
          key:          venv-newscript-v1-${{ env.ARCH }}-${{ hashFiles('pyside6_android_builder.py') }}
          restore-keys: venv-newscript-v1-${{ env.ARCH }}-

      # Buildozer downloads its OWN copy of Android SDK/NDK + cross-compiled Python
      # into ~/.buildozer (yes, redundant with ~/.pyside6_android_deploy — buildozer
      # owns its own toolchain). Caching this is the single biggest time saver after
      # the first successful run: subsequent builds drop from ~45 min to ~10 min.
      # NB: we use a fresh cache prefix (newscript-v1) because the previous workflow
      # cached state from p4a@develop builds (Python 3.14). The new script pins
      # p4a to commit 2ebea90d (Python 3.11.5), and we don't want stale 3.14
      # artifacts bleeding through.
      - name: Cache buildozer toolchain
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key:          buildozer-newscript-v1-${{ env.ARCH }}
          restore-keys: buildozer-newscript-v1-${{ env.ARCH }}-

      - name: Download user project
        run: |
          mkdir -p workspace
          curl -L --fail "$PROJECT_URL" -o project.zip
          unzip -q project.zip -d workspace
          # Find the directory that actually contains main.py (zip might have a wrapper folder)
          PROJ_DIR="$(dirname "$(find workspace -name main.py -maxdepth 3 | head -1)")"
          echo "PROJ_DIR=$PROJ_DIR" >> "$GITHUB_ENV"
          echo "Detected project at: $PROJ_DIR"
          ls -la "$PROJ_DIR"

      - name: Build APK
        # The new script takes project_dir as a positional argument and uses
        # Android-style ABI names (arm64-v8a, armeabi-v7a, x86_64, x86) rather
        # than the GNU triplet style of the old script (aarch64, armv7a, etc.).
        # The workflow `arch` input above is already in the new format.
        run: |
          mkdir -p "$HOME/.cache/pyside6-android-builder"
          python pyside6_android_builder.py "$PROJ_DIR" \
            --arch "$ARCH" \
            --mode debug \
            --venv-dir "$HOME/.cache/pyside6-android-builder/venv-${ARCH}" \
            --verbose

      - name: Locate APK
        id: locate
        run: |
          APK="$(find "$PROJ_DIR" -name '*.apk' | head -1)"
          if [ -z "$APK" ]; then echo "::error::No APK produced"; exit 1; fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Built: $APK ($(du -h "$APK" | cut -f1))"

      - name: Sanity-check APK contents
        # Belt-and-braces: the script's regex patches on PySide6 source could in
        # principle silently fail to match (if PySide6 ships a slightly reformatted
        # buildozer.py in some patch release). If that happens we'd build a Python
        # 3.14 APK again. This step catches it before the artifact is published.
        run: |
          echo "libpython / libshiboken entries in APK:"
          unzip -l "${{ steps.locate.outputs.apk_path }}" \
            | grep -E 'libpython|libshiboken' || true
          if ! unzip -l "${{ steps.locate.outputs.apk_path }}" | grep -q 'libpython3\.11'; then
            echo "::error::APK does not contain libpython3.11.* — the PySide6 buildozer.py patch did not take effect."
            exit 1
          fi
          echo "✓ APK contains libpython3.11"

      - name: Upload APK as workflow artifact (Day 1 — download from Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.ARCH }}${{ env.BUILD_ID && format('-{0}', env.BUILD_ID) || '' }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 7

      # ──────────────────────────────────────────────────────────────────────
      # Phase 2 hooks: uncomment these once Django + R2 + webhook are wired up.
      # Day 1 stops at "APK in the artifacts tab" — that's enough.
      # ──────────────────────────────────────────────────────────────────────
      # - name: Upload APK to R2 (Phase 2)
