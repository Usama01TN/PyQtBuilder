# ============================================================================
#  PyQt5 -> Android APK build workflow
#  ==================================
#
#  Uses the clean pyqt5_android_kviktor.py (which applies its own quirks
#  and uses the correct pyqtdeploy 2.5.1 schemas).
#
#  Pipeline:
#    1. Build the Docker image (Python 3.7, Qt, NDK, SDK, pyqtdeploy venv)
#    2. Cache the heavy sysroot + source tarballs across runs
#    3. Download the user's PyQt5 project
#    4. Invoke the builder INSIDE the container (single step, no patches)
#    5. Upload the APK artifact
#
#  This workflow does NOT patch the kviktor script or builders.py, does NOT
#  pre-create sysroot.json/app.pdy externally, does NOT do case-alias
#  shenanigans.  All of that is handled by the builder itself.
# ============================================================================
name: Build PyQt5 -> Android (v3 / clean builder)

on:
  workflow_dispatch:
    inputs:
      project_url:
        description: 'URL to a .zip containing the PyQt5 project (with main.py at root)'
        required: true
        default: 'https://raw.githubusercontent.com/Usama01TN/PyQtBuilder/main/testapp_qt5.zip'
      app_name:
        description: 'App name (Java identifier, e.g. MyApp)'
        required: true
        default: 'TestApp'
      package_name:
        description: 'Android package name (e.g. com.example.myapp)'
        required: true
        default: 'com.example.testapp'
      pyqt5_modules:
        description: 'Comma-separated PyQt5 modules (or blank for default Widgets set)'
        required: false
        default: ''
      force_rebuild_sysroot:
        description: 'Force full sysroot rebuild (slow, ~30 min)'
        required: false
        default: 'false'
        type: boolean
  push:
    branches: [main, master]
    paths:
      - 'pyqt5_android_kviktor.py'
      - 'Dockerfile.pyqt5-kviktor'
      - '.github/workflows/build-pyqt5-android-v3.yml'

env:
  PROJECT_URL:   ${{ github.event.inputs.project_url   || 'https://raw.githubusercontent.com/Usama01TN/PyQtBuilder/main/testapp_qt5.zip' }}
  APP_NAME:      ${{ github.event.inputs.app_name      || 'TestApp' }}
  PACKAGE_NAME:  ${{ github.event.inputs.package_name  || 'com.example.testapp' }}
  PYQT5_MODULES: ${{ github.event.inputs.pyqt5_modules || '' }}
  FORCE_SYSROOT: ${{ github.event.inputs.force_rebuild_sysroot || 'false' }}
  PROJ_DIR:      workspace/testapp        # project unpacks here
  JOBS:          2

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240   # sysroot build can take 30-90 min on first run
    permissions:
      contents: read

    steps:
      # =================================================================
      # 1. Checkout
      # =================================================================
      - name: Checkout repo (for builder script + Dockerfile)
        uses: actions/checkout@v4

      - name: Verify required files are in repo
        run: |
          set -e
          for f in pyqt5_android_kviktor.py Dockerfile.pyqt5-kviktor; do
              if [ ! -f "$f" ]; then
                  echo "::error::Missing required file: $f"
                  exit 1
              fi
              echo "  ok: $f ($(stat -c %s "$f") bytes)"
          done

      # =================================================================
      # 2. Free disk
      # =================================================================
      - name: Free disk space (Docker image + Qt + NDK need ~15 GB)
        run: |
          set -e
          df -h /
          # Remove the GHA runner's bundled tools we don't need.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
              /usr/local/lib/android/sdk/build-tools /opt/ghc \
              /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo apt-get purge -y --no-install-recommends \
              azure-cli google-cloud-cli google-chrome-stable \
              firefox powershell mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          docker image prune -af 2>/dev/null || true
          df -h /

      # =================================================================
      # 3. Docker setup + build
      # =================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Dockerfile hash (for cache key)
        id: dockerhash
        run: |
          HASH=$(sha256sum Dockerfile.pyqt5-kviktor | awk '{print $1}' | cut -c1-12)
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "Dockerfile SHA-12: ${HASH}"

      - name: Build pyqt5-kviktor-builder Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.pyqt5-kviktor
          tags: pyqt5-kviktor-builder:latest
          load: true
          cache-from: type=gha,scope=pyqt5-kviktor-${{ steps.dockerhash.outputs.hash }}
          cache-to:   type=gha,scope=pyqt5-kviktor-${{ steps.dockerhash.outputs.hash }},mode=max

      - name: Show Docker image contents
        run: |
          docker run --rm pyqt5-kviktor-builder bash -c '
              echo "=== image identity ==="
              cat /etc/os-release | head -3
              echo
              echo "=== Python ==="
              /usr/local/bin/python3.7 --version
              echo
              echo "=== build venv ==="
              ls -la /root/build-venv/bin/ | grep -E "pyqt|python|pip" | head
              echo
              echo "=== Qt ==="
              ls /root/Qt/5.13.2/android_arm64_v8a/bin/ | head -5
              echo
              echo "=== NDK ==="
              cat /root/Android/android-ndk-r20b/source.properties 2>/dev/null || echo "(no source.properties)"
              echo
              echo "=== SDK ==="
              ls /root/Android/tools/
          '

      # =================================================================
      # 4. Cache the source tarballs + sysroot across runs
      # =================================================================
      # The sysroot dir is hundreds of MB and takes 20-40 min to build.
      # We cache the user's project dir (where sources/ and sysroot-* live).
      # Cache key includes the builder script hash so re-running with the
      # same builder reuses the cache.
      - name: Cache sources + sysroot
        id: cache-sysroot
        uses: actions/cache@v4
        with:
          path: |
            workspace/testapp/sources
            workspace/testapp/sysroot-android-64
          key: pyqt5-sysroot-${{ hashFiles('pyqt5_android_kviktor.py', 'Dockerfile.pyqt5-kviktor') }}-v1
          restore-keys: |
            pyqt5-sysroot-

      # =================================================================
      # 5. Download user project
      # =================================================================
      - name: Download user project
        run: |
          set -e
          mkdir -p "${PROJ_DIR}"
          echo "Downloading: ${PROJECT_URL}"
          curl -fL --retry 3 --max-time 120 -o /tmp/project.zip "${PROJECT_URL}"
          unzip -o /tmp/project.zip -d "${PROJ_DIR}"
          echo
          echo "Project contents:"
          find "${PROJ_DIR}" -maxdepth 3 -not -path '*sources*' \
              -not -path '*sysroot-*' -not -path '*build-*' | sort
          echo
          echo "main.py preview:"
          if [ -f "${PROJ_DIR}/main.py" ]; then
              head -20 "${PROJ_DIR}/main.py"
          else
              echo "(no main.py at project root -- builder will create a template)"
          fi

      # =================================================================
      # 6. Run the builder
      # =================================================================
      # ONE step.  The builder script handles its own SDK quirks,
      # source download fallbacks, config generation, compilation,
      # packaging, and APK location.
      - name: Build APK
        id: build
        run: |
          set -o pipefail
          mkdir -p /home/runner/apk-output

          # Build args for the builder
          FORCE_ARG=""
          if [ "${FORCE_SYSROOT}" = "true" ]; then
              FORCE_ARG="--force"
              echo "::notice::Forced sysroot rebuild requested (will take ~30 min)"
          fi
          PYQT5_ARG=""
          if [ -n "${PYQT5_MODULES}" ]; then
              PYQT5_ARG="--pyqt5-modules ${PYQT5_MODULES}"
          fi

          docker run --rm \
              -v "${GITHUB_WORKSPACE}:/work" \
              -v "/home/runner/apk-output:/output" \
              -w /work \
              -e LANG=C.UTF-8 \
              pyqt5-kviktor-builder \
              /usr/local/bin/python3.7 /work/pyqt5_android_kviktor.py \
                  --project-dir   "/work/${PROJ_DIR}" \
                  --app-name      "${APP_NAME}" \
                  --package-name  "${PACKAGE_NAME}" \
                  --output-dir    "/output" \
                  --jobs          "${JOBS}" \
                  ${PYQT5_ARG} \
                  ${FORCE_ARG} \
                  --verbose \
              2>&1 | tee /home/runner/apk-output/build.log

      # =================================================================
      # 7. Verify + upload
      # =================================================================
      - name: Verify APK output
        if: success()
        run: |
          set -e
          OUTPUT_DIR=/home/runner/apk-output
          echo "Contents of ${OUTPUT_DIR}:"
          ls -la "${OUTPUT_DIR}/"

          APK="${OUTPUT_DIR}/${APP_NAME}-debug.apk"
          if [ ! -f "${APK}" ]; then
              echo "::error::Expected APK not found: ${APK}"
              echo "Available .apk files:"
              find "${OUTPUT_DIR}" -name "*.apk" 2>/dev/null || true
              exit 1
          fi
          SIZE=$(stat -c %s "${APK}")
          SHA=$(sha256sum "${APK}" | awk '{print $1}')
          echo "  APK:    ${APK}"
          echo "  Size:   ${SIZE} bytes ($((SIZE / 1024 / 1024)) MB)"
          echo "  SHA256: ${SHA}"

          # Sanity: APK should be a valid ZIP
          if ! unzip -l "${APK}" > /dev/null 2>&1; then
              echo "::error::APK is not a valid ZIP file"
              exit 1
          fi
          # Should contain libmain.so and classes.dex
          if ! unzip -l "${APK}" | grep -q 'libmain.so'; then
              echo "::warning::APK does not contain libmain.so"
          fi
          if ! unzip -l "${APK}" | grep -q 'classes.dex'; then
              echo "::warning::APK does not contain classes.dex"
          fi
          echo "  ok: APK validated"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-debug-apk
          path: /home/runner/apk-output/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /home/runner/apk-output/build.log
          if-no-files-found: ignore
          retention-days: 14

      # =================================================================
      # 8. Failure diagnostics
      # =================================================================
      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "::group::Last 200 lines of build log"
          tail -200 /home/runner/apk-output/build.log 2>/dev/null || \
              echo "(no build log)"
          echo "::endgroup::"

          echo "::group::Workspace tree (depth 4)"
          find "${GITHUB_WORKSPACE}/${PROJ_DIR}" -maxdepth 4 \
              -not -path '*sysroot*' \
              -not -path '*sources*' 2>/dev/null | sort || true
          echo "::endgroup::"

          if [ -f "${GITHUB_WORKSPACE}/${PROJ_DIR}/sysroot.json" ]; then
              echo "::group::Generated sysroot.json"
              cat "${GITHUB_WORKSPACE}/${PROJ_DIR}/sysroot.json"
              echo "::endgroup::"
          fi
          if [ -f "${GITHUB_WORKSPACE}/${PROJ_DIR}/app.pdy" ]; then
              echo "::group::Generated app.pdy"
              cat "${GITHUB_WORKSPACE}/${PROJ_DIR}/app.pdy"
              echo "::endgroup::"
          fi

          echo "::group::Disk usage"
          df -h /
          du -sh "${GITHUB_WORKSPACE}/${PROJ_DIR}"/* 2>/dev/null || true
          echo "::endgroup::"
