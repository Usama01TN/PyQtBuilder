name: build-pyqt5-android

# Compiles Python 3.10 + SIP 6.8 + PyQt5 5.15 from source for Android using
# pyqtdeploy. Completely different toolchain from the PySide6 builder.
#
# Project requirements:
#   - main.py at the project root with `from PyQt5...` imports (NOT PySide6)
#   - Optionally a .pdt file (pyqtdeploy build target).  If absent, the
#     workflow auto-generates a minimal one for QtCore/QtGui/QtWidgets apps.
#
# Known issue with Qt 5.15.2 Android:
#   Qt's online repo for the 5.15.2 Android target has been progressively
#   degraded since Qt 5.15 LTS went commercial-only in 2020.  aqtinstall
#   sometimes can't find the expected package names ("qt_base not found").
#   This workflow tries multiple aqt versions and mirrors as fallbacks,
#   and if all fail it surfaces actionable diagnostics.

on:
  workflow_dispatch:
    inputs:
      project_url:
        description: "Public URL to PyQt5 project zip"
        required: true
        default: "https://raw.githubusercontent.com/Usama01TN/PyQtBuilder/main/testapp_qt5.zip"
      arch:
        description: "Target ABI"
        required: true
        default: "android-64"
        type: choice
        options:
          - android-64
          - android-32
          - android-x86_64
          - android-x86
      app_name:
        description: "App name (defaults to project dir basename)"
        required: false
        default: ""
      build_id:
        description: "Optional build ID for tracking"
        required: false
        default: ""

  repository_dispatch:
    types: [pyqt5-android-build]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      PROJECT_URL: ${{ github.event.inputs.project_url || github.event.client_payload.project_url }}
      ARCH:        ${{ github.event.inputs.arch        || github.event.client_payload.arch        }}
      APP_NAME:    ${{ github.event.inputs.app_name    || github.event.client_payload.app_name    }}
      BUILD_ID:    ${{ github.event.inputs.build_id    || github.event.client_payload.build_id    }}
      QT_VERSION:        "5.15.2"
      PYQT_VERSION:      "5.15.10"
      SIP_VERSION:       "6.8.3"
      PYTHON_VERSION:    "3.10.14"
      ANDROID_API:       "28"
      NDK_VERSION:       "21.4.7075529"
      BUILD_TOOLS_VER:   "28.0.3"
      QT_INSTALL_DIR: ${{ github.workspace }}/Qt

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Free disk space (need ~30 GB)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      /usr/local/lib/android/sdk/ndk \
                      /opt/hostedtoolcache/CodeQL \
                      "$AGENT_TOOLSDIRECTORY"
          sudo apt-get -y purge --auto-remove \
              azure-cli google-cloud-cli microsoft-edge-stable \
              google-chrome-stable firefox powershell || true
          docker system prune -af || true
          df -h

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential cmake autoconf automake libtool pkg-config m4 \
              git curl wget unzip zip xz-utils ccache p7zip-full \
              libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
              libdbus-1-dev libfontconfig1-dev libfreetype6-dev \
              libffi-dev libssl-dev zlib1g-dev \
              libncurses-dev libsqlite3-dev libbz2-dev liblzma-dev \
              libreadline-dev libgdbm-dev libnss3-dev libgdbm-compat-dev \
              tk-dev uuid-dev libpng-dev libjpeg-dev

      - name: Map ARCH to Qt's android arch name
        id: archmap
        run: |
          case "$ARCH" in
            android-64)     echo "qt_arch=android_arm64_v8a" >> "$GITHUB_OUTPUT" ;;
            android-32)     echo "qt_arch=android_armv7"     >> "$GITHUB_OUTPUT" ;;
            android-x86)    echo "qt_arch=android_x86"       >> "$GITHUB_OUTPUT" ;;
            android-x86_64) echo "qt_arch=android_x86_64"    >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unknown arch: $ARCH"; exit 1 ;;
          esac

      - name: Cache Qt 5.15.2 (host + android)
        id: qt-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_INSTALL_DIR }}
          # v3: invalidate prior caches polluted by half-broken installs.
          key: qt-${{ env.QT_VERSION }}-${{ steps.archmap.outputs.qt_arch }}-v3

      # ───────────────────────────────────────────────────────────────────
      #  Qt 5.15.2 Android install — robust multi-strategy approach.
      # ───────────────────────────────────────────────────────────────────
      - name: Install Qt 5.15.2 desktop (host tools)
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install "aqtinstall>=3.1,<3.2"
          mkdir -p "$QT_INSTALL_DIR"
          # Host Qt — needed for moc, rcc, qmake.  Consistently works.
          aqt install-qt linux desktop "$QT_VERSION" \
            --outputdir "$QT_INSTALL_DIR"
          echo "✓ Desktop Qt installed at $QT_INSTALL_DIR/$QT_VERSION/gcc_64"

      - name: Diagnose Qt 5.15.2 Android repo state
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          echo "::group::What aqt reports as available for 5.15.2 Android"
          aqt list-qt linux android --arch 5.15.2 || \
            echo "list-qt returned no architectures — repo metadata is degraded"
          echo "::endgroup::"
          echo "::group::Direct fetch of Qt 5.15.2 Android Updates.xml"
          curl -sSL "https://download.qt.io/online/qtsdkrepository/linux_x64/android/qt5_5152/Updates.xml" \
              -o /tmp/qt-android-updates.xml || true
          if [ -s /tmp/qt-android-updates.xml ]; then
            echo "Updates.xml downloaded, $(wc -c < /tmp/qt-android-updates.xml) bytes"
            echo "Package <Name> elements found:"
            grep -oP '<Name>[^<]+</Name>' /tmp/qt-android-updates.xml | sort -u | head -20
          else
            echo "Updates.xml not accessible at qt5_5152/ — Qt may have moved it"
          fi
          echo "::endgroup::"

      - name: Install Qt 5.15.2 Android (multi-mirror, multi-aqt-version)
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          ARCH_QT="${{ steps.archmap.outputs.qt_arch }}"

          # Strategy = (aqt_version_spec, base_url). Empty base_url = aqt default.
          declare -a STRATEGIES=(
            "aqtinstall>=3.1,<3.2|"
            "aqtinstall>=3.1,<3.2|https://download.qt.io"
            "aqtinstall>=3.1,<3.2|https://master.qt.io"
            "aqtinstall>=3.1,<3.2|https://mirrors.tuna.tsinghua.edu.cn/qt"
            "aqtinstall>=3.1,<3.2|https://mirrors.aliyun.com/qt"
            "aqtinstall>=3.1,<3.2|https://qt-mirror.dannhauer.de"
            "aqtinstall==2.2.3|"
            "aqtinstall==2.2.3|https://master.qt.io"
          )

          INSTALLED=false
          for STRATEGY in "${STRATEGIES[@]}"; do
            AQT_VERSION="${STRATEGY%%|*}"
            BASE_URL="${STRATEGY##*|}"
            echo "::group::Trying aqt='$AQT_VERSION'  base='${BASE_URL:-(default)}'"
            python -m pip install --quiet "$AQT_VERSION" || {
              echo "Could not install $AQT_VERSION"
              echo "::endgroup::"
              continue
            }
            BASE_ARG=""
            [ -n "$BASE_URL" ] && BASE_ARG="--base $BASE_URL"
            if aqt install-qt linux android "$QT_VERSION" "$ARCH_QT" \
                 $BASE_ARG \
                 --outputdir "$QT_INSTALL_DIR" 2>&1; then
              echo "::endgroup::"
              echo "✓ SUCCESS: aqt=$AQT_VERSION  base=${BASE_URL:-default}"
              INSTALLED=true
              break
            fi
            echo "::endgroup::"
            echo "✗ Failed.  Trying next strategy..."
          done

          if ! $INSTALLED; then
            echo "::error::All aqt strategies failed for Qt 5.15.2 Android."
            echo "::error::The Qt online repo no longer serves the expected packages."
            echo "::error::"
            echo "::error::Options:"
            echo "::error::  1. Migrate to PyQt6 + Qt 6.x (Qt 6 Android repos are healthy)"
            echo "::error::  2. Build Qt 5.15.2 from source for Android (~6 hours, 30 GB)"
            echo "::error::  3. Self-host a Qt 5.15.2 Android tarball and download it here"
            echo "::error::"
            echo "::error::See the 'Diagnose Qt 5.15.2 Android repo state' step's"
            echo "::error::output above for what the repo actually contains."
            exit 1
          fi

          # Sanity-check the arch tree exists
          if [ ! -d "$QT_INSTALL_DIR/$QT_VERSION/$ARCH_QT" ]; then
            echo "::error::Install reported success but $QT_INSTALL_DIR/$QT_VERSION/$ARCH_QT/ is missing"
            ls -la "$QT_INSTALL_DIR/$QT_VERSION/" || true
            exit 1
          fi

      # ───────────── Android SDK + NDK r21e ────────────────────────
      - name: Cache Android NDK r21e + SDK platforms/build-tools
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Android/Sdk/ndk/${{ env.NDK_VERSION }}
            ~/Android/Sdk/platforms/android-${{ env.ANDROID_API }}
            ~/Android/Sdk/build-tools/${{ env.BUILD_TOOLS_VER }}
            ~/Android/Sdk/platform-tools
          key: android-sdk-ndk-${{ env.NDK_VERSION }}-api${{ env.ANDROID_API }}-bt${{ env.BUILD_TOOLS_VER }}-v1

      - name: Install pinned NDK + SDK platform/build-tools via sdkmanager
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          SDKMANAGER=/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager
          export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          cp /usr/local/lib/android/sdk/licenses/* "$ANDROID_SDK_ROOT/licenses/" || true
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
              "platform-tools" \
              "platforms;android-$ANDROID_API" \
              "build-tools;$BUILD_TOOLS_VER" \
              "ndk;$NDK_VERSION"

      # ───────────── Sysroot cache ───────────────────────────────────
      - name: Cache cross-compiled sysroot
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pyqt-builder-venv
            ~/.pyqt-builder-sources
          key: pyqt5-sysroot-py${{ env.PYTHON_VERSION }}-qt${{ env.QT_VERSION }}-pyqt${{ env.PYQT_VERSION }}-sip${{ env.SIP_VERSION }}-${{ env.ARCH }}-v1
          restore-keys: |
            pyqt5-sysroot-py${{ env.PYTHON_VERSION }}-qt${{ env.QT_VERSION }}-pyqt${{ env.PYQT_VERSION }}-sip${{ env.SIP_VERSION }}-${{ env.ARCH }}-

      # ───────────── Project setup ──────────────────────────────────
      - name: Download user project
        run: |
          mkdir -p workspace
          curl -L --fail "$PROJECT_URL" -o project.zip
          unzip -q project.zip -d workspace
          MAIN_PY="$(find workspace -name 'main.py' -maxdepth 4 | head -1)"
          if [ -z "$MAIN_PY" ]; then
            echo "::error::Project contains no main.py"
            exit 1
          fi
          PROJ_DIR="$(dirname "$MAIN_PY")"
          APP_NAME_RESOLVED="${APP_NAME:-$(basename "$PROJ_DIR")}"
          echo "PROJ_DIR=$PROJ_DIR"               >> "$GITHUB_ENV"
          echo "MAIN_PY=$MAIN_PY"                 >> "$GITHUB_ENV"
          echo "APP_NAME_RESOLVED=$APP_NAME_RESOLVED" >> "$GITHUB_ENV"
          echo "Project located: $PROJ_DIR"
          echo "App name:        $APP_NAME_RESOLVED"
          ls -la "$PROJ_DIR"

      - name: Auto-patch PySide6 imports → PyQt5 in main.py
        # testapp_qt5.zip's main.py uses `from PySide6...` which won't work
        # with this builder (it bundles PyQt5, not PySide6). Patch in place.
        # Also fixes app.exec() → app.exec_() since PyQt5 still uses the
        # underscored form (exec() is reserved in older Python 3).
        run: |
          if grep -q "from PySide6\|import PySide6" "$MAIN_PY"; then
            echo "::notice::Detected PySide6 imports in main.py — patching to PyQt5"
            cp "$MAIN_PY" "$MAIN_PY.pyside6.bak"
            python3 - <<'PYEOF'
          import os, re
          path = os.environ['MAIN_PY']
          with open(path) as f:
              src = f.read()
          src = re.sub(r'\bfrom PySide6\b',   'from PyQt5',   src)
          src = re.sub(r'\bimport PySide6\b', 'import PyQt5', src)
          src = re.sub(r'(\bapp\.)exec\(\)',  r'\1exec_()',   src)
          with open(path, 'w') as f:
              f.write(src)
          print('Patched main.py:')
          for line in src.splitlines():
              if 'PyQt5' in line or 'exec' in line:
                  print('  ' + line)
          PYEOF
          else
            echo "main.py already uses PyQt5 (or has no Qt imports)"
          fi

      - name: Auto-generate minimal .pdt if missing
        # pyqtdeploy needs a .pdt file describing which PyQt modules and
        # stdlib extensions to compile in.  If absent, scaffold a minimal
        # one based on what the source actually imports.
        run: |
          PDT="$(find "$PROJ_DIR" -name '*.pdt' -maxdepth 4 | head -1)"
          if [ -n "$PDT" ]; then
            echo "Using existing .pdt: $PDT"
            echo "PDT_FILE=$PDT" >> "$GITHUB_ENV"
          else
            PDT_PATH="$PROJ_DIR/${APP_NAME_RESOLVED}.pdt"
            echo "::notice::No .pdt found — generating minimal target at $PDT_PATH"
            MODS="$(python3 - <<'PYEOF'
          import os, ast
          proj = os.environ['PROJ_DIR']
          found = {'QtCore', 'QtGui', 'QtWidgets'}
          for root, _, files in os.walk(proj):
              for f in files:
                  if not f.endswith('.py'): continue
                  try:
                      tree = ast.parse(open(os.path.join(root, f)).read())
                  except Exception:
                      continue
                  for node in ast.walk(tree):
                      if isinstance(node, ast.ImportFrom) and node.module \
                              and node.module.startswith('PyQt5.'):
                          found.add(node.module.split('.', 1)[1])
                      elif isinstance(node, ast.ImportFrom) and node.module == 'PyQt5':
                          for alias in node.names:
                              if alias.name.startswith('Qt'):
                                  found.add(alias.name)
                      elif isinstance(node, ast.Import):
                          for alias in node.names:
                              if alias.name.startswith('PyQt5.'):
                                  found.add(alias.name.split('.', 1)[1])
          print(','.join(sorted(found)))
          PYEOF
            )"
            echo "Detected PyQt5 modules: $MODS"
            {
              echo '<?xml version="1.0" encoding="UTF-8"?>'
              echo "<Project version=\"11\">"
              echo " <Application entrypoint=\"\" isconsole=\"0\" isbundle=\"0\""
              echo "              name=\"${APP_NAME_RESOLVED}\" script=\"main.py\" syspath=\"\">"
              echo "  <PyrccrcFiles/>"
              echo "  <Package name=\"\"/>"
              echo "  <PyQtModules>"
              IFS=',' read -ra MOD_ARR <<< "$MODS"
              for m in "${MOD_ARR[@]}"; do
                echo "   <PyQtModule name=\"$m\"/>"
              done
              echo "  </PyQtModules>"
              echo "  <Stdlib>"
              echo '   <Extension name="_sha512"/>'
              echo '   <Extension name="_sha256"/>'
              echo '   <Extension name="zlib"/>'
              echo "  </Stdlib>"
              echo "  <OtherExtensionModules/>"
              echo "  <Sites/>"
              echo " </Application>"
              echo "</Project>"
            } > "$PDT_PATH"
            echo "Generated $PDT_PATH:"
            cat "$PDT_PATH"
            echo "PDT_FILE=$PDT_PATH" >> "$GITHUB_ENV"
          fi

      # ───────────── Build ────────────────────────────────────────────
      - name: Build APK
        run: |
          QT_DIR="$QT_INSTALL_DIR/$QT_VERSION/${{ steps.archmap.outputs.qt_arch }}"
          if [ ! -d "$QT_DIR" ]; then
            echo "::error::Qt for Android not found at $QT_DIR"
            ls -la "$QT_INSTALL_DIR/$QT_VERSION/" || true
            exit 1
          fi

          APP_NAME_ARG=""
          if [ -n "$APP_NAME" ]; then
            APP_NAME_ARG="--app-name $APP_NAME"
          fi

          python pyqt5_android_builder.py \
            --project-dir "$PROJ_DIR" \
            $APP_NAME_ARG \
            --arch "$ARCH" \
            --qt-version "$QT_VERSION" \
            --pyqt-version "$PYQT_VERSION" \
            --sip-version "$SIP_VERSION" \
            --qt-dir "$QT_DIR" \
            --ndk-path "$HOME/Android/Sdk/ndk/$NDK_VERSION" \
            --sdk-path "$HOME/Android/Sdk" \
            --verbose \
            2>&1 | tee build.log

          if grep -q "Exception occurred: Traceback\|CalledProcessError" build.log; then
            echo "::warning::Builder produced a failure marker — check the log"
          fi

      - name: Locate APK
        id: locate
        if: success()
        run: |
          APK="$(find "$PROJ_DIR" -name '*.apk' -type f | head -1)"
          if [ -z "$APK" ]; then
            echo "::error::No APK produced — see build.log artifact"
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Built: $APK ($(du -h "$APK" | cut -f1))"

      - name: Sanity-check APK contents
        run: |
          APK="${{ steps.locate.outputs.apk_path }}"
          unzip -l "$APK" | grep -E 'libpython|libQt5|libsip|pyqt' | head -20
          if ! unzip -l "$APK" | grep -q "libpython3\.10"; then
            echo "::error::APK does not contain libpython3.10 — build is broken"
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.ARCH }}${{ env.BUILD_ID && format('-{0}', env.BUILD_ID) || '' }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log${{ env.BUILD_ID && format('-{0}', env.BUILD_ID) || '' }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
